<div class="login-container">
  <!-- Theme Toggle -->
  <div class="theme-toggle-container">
    <app-theme-toggle></app-theme-toggle>
  </div>

  <div class="login-box">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span>C</span>
      </div>
      <h1>Career OS</h1>
      <p>Welcome back</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form">
      <!-- Error Message -->
      <div *ngIf="error()" class="error-message">
        <p>{{ error() }}</p>
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          [class.error]="submitted() && f['email'].errors"
          placeholder="you@example.com"
        />
        <p *ngIf="submitted() && f['email'].errors?.['required']" class="error-text">
          Email is required
        </p>
        <p *ngIf="submitted() && f['email'].errors?.['email']" class="error-text">
          Please enter a valid email
        </p>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          [class.error]="submitted() && f['password'].errors"
          placeholder="••••••••"
        />
        <p *ngIf="submitted() && f['password'].errors?.['required']" class="error-text">
          Password is required
        </p>
        <p *ngIf="submitted() && f['password'].errors?.['minlength']" class="error-text">
          Password must be at least 6 characters
        </p>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn" [disabled]="loading()">
        <span *ngIf="!loading()">Sign In</span>
        <span *ngIf="loading()" class="loading-spinner">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Signing in...
        </span>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>New to Career OS?</span>
    </div>

    <!-- Sign Up Link -->
    <a routerLink="/signup" class="signup-link">
      Create Account
    </a>
  </div>
</div>
