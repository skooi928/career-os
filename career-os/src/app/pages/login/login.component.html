<div class="min-h-screen bg-gradient-to-br from-white to-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-gradient-to-br from-emerald-600 to-emerald-500 mb-4">
        <span class="text-white text-2xl font-bold">C</span>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Career OS</h1>
      <p class="text-gray-600">Welcome back</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <!-- Error Message -->
      <div *ngIf="error()" class="p-4 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-red-700 text-sm">{{ error() }}</p>
      </div>

      <!-- Email Field -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Email Address
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          [class]="'w-full px-4 py-2.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed ' +
            (submitted() && f['email'].errors ? 'border-red-500 bg-red-50' : 'border-gray-300 bg-white')"
          placeholder="you@example.com"
        />
        <p *ngIf="submitted() && f['email'].errors?.['required']" class="text-red-500 text-xs mt-1">
          Email is required
        </p>
        <p *ngIf="submitted() && f['email'].errors?.['email']" class="text-red-500 text-xs mt-1">
          Please enter a valid email
        </p>
      </div>

      <!-- Password Field -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          [class]="'w-full px-4 py-2.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed ' +
            (submitted() && f['password'].errors ? 'border-red-500 bg-red-50' : 'border-gray-300 bg-white')"
          placeholder="••••••••"
        />
        <p *ngIf="submitted() && f['password'].errors?.['required']" class="text-red-500 text-xs mt-1">
          Password is required
        </p>
        <p *ngIf="submitted() && f['password'].errors?.['minlength']" class="text-red-500 text-xs mt-1">
          Password must be at least 6 characters
        </p>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loading()"
        [class]="'w-full py-2.5 px-4 rounded-lg font-medium transition duration-200 ' +
          (loading() ? 'bg-gray-400 cursor-not-allowed text-white' : 'bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-700 hover:to-emerald-600 text-white')"
      >
        <span *ngIf="!loading()">Sign In</span>
        <span *ngIf="loading()" class="inline-flex items-center">
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Signing in...
        </span>
      </button>
    </form>

    <!-- Divider -->
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-2 bg-white text-gray-500">New to Career OS?</span>
      </div>
    </div>

    <!-- Sign Up Link -->
    <a
      routerLink="/signup"
      class="block w-full py-2.5 px-4 rounded-lg font-medium border-2 border-emerald-600 text-emerald-600 hover:bg-emerald-50 transition duration-200 text-center"
    >
      Create Account
    </a>
  </div>
</div>
